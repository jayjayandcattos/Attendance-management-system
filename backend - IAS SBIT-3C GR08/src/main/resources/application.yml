spring:
  application:
    name: attendease-backend
  
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
      exclude: static/**,public/**,templates/**
    livereload:
      enabled: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:carlobaclao789@gmail.com}
    password: ${MAIL_PASSWORD:ijlxhoyruplmppql}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: jdbc:postgresql://localhost:5432/attendease_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:leapfrog}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Manila

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

# Application-specific configuration
app:
  jwt:
    secret: ${JWT_SECRET:attendease-super-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256}
    access-token-expiration-ms: 86400000       # 24 hours (Stable Session)
    refresh-token-expiration-ms: 604800000   # 7 days

  encryption:
    aes-secret-key: ${AES_SECRET:AttendEaseAES256SecretKey@Dev32!}

  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://192.168.1.2:5173,http://192.168.137.1:5173,http://192.168.137.7:5173,http://192.168.1.122:5173,https://*.ngrok-free.dev

  upload:
    dir: ./uploads
    max-size: 10485760
    allowed-types: pdf,ppt,pptx,doc,docx,xls,xlsx,jpg,jpeg,png,gif,mp4,zip,rar,txt,csv
